name: Update to new release

# checkov:skip=CKV_GHA_7: Manual maintainer override of upstream version. Refactor to `scoop checkver -u` is tracked separately and will remove this input. Input is regex-validated below.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to update to (e.g. 4.2.2.26075)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-to-new-release:
    runs-on: windows-2025

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set variables
        shell: pwsh
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          $s3Url = "https://senzing-production-win.s3.amazonaws.com/"
          $version = $env:INPUT_VERSION

          # Validate version format to prevent injection via the workflow_dispatch input
          if ($version -notmatch '^\d+\.\d+\.\d+\.\d+$') {
              Write-Error "Invalid version format: '$version'. Expected pattern: <major>.<minor>.<patch>.<build> (digits and dots only)."
              exit 1
          }

          $key = "SenzingSDK_${version}.msi"

          echo "S3_URL=$s3Url" >> $env:GITHUB_ENV
          echo "NEW_VERSION=$version" >> $env:GITHUB_ENV
          echo "LATEST_KEY=$key" >> $env:GITHUB_ENV

      - name: Get current manifest version
        shell: pwsh
        run: |
          $manifest = Get-Content -Path "bucket/senzingsdk.json" -Raw | ConvertFrom-Json
          echo "CURRENT_VERSION=$($manifest.version)" >> $env:GITHUB_ENV

      - name: Download and update manifest
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $downloadUrl = "$env:S3_URL$env:LATEST_KEY"
          $tempFile = Join-Path $env:TEMP $env:LATEST_KEY
          $manifestPath = "bucket/senzingsdk.json"

          Write-Host "Downloading: $downloadUrl"
          Invoke-WebRequest -Uri $downloadUrl -OutFile $tempFile -UseBasicParsing

          # Validate that S3 actually returned an MSI, not an error body or redirect HTML.
          # MSI files are OLE compound documents; the first 8 bytes are a fixed magic value.
          $magicBytes = Get-Content -Path $tempFile -AsByteStream -TotalCount 8
          $magicHex = ($magicBytes | ForEach-Object { $_.ToString('X2') }) -join ''
          if ($magicHex -ne 'D0CF11E0A1B11AE1') {
              Write-Error "Downloaded file is not an MSI (magic bytes: $magicHex; expected D0CF11E0A1B11AE1). S3 may have returned a non-MSI body."
              exit 1
          }

          Write-Host "Computing SHA256 hash..."
          $hash = (Get-FileHash -Path $tempFile -Algorithm SHA256).Hash.ToLower()
          Write-Host "SHA256: $hash"

          # Update manifest fields in-place to preserve formatting
          $content = Get-Content -Path $manifestPath -Raw

          # Top-level version (only one in the manifest)
          $content = $content -replace '"version":\s*"[^"]+"', "`"version`": `"$env:NEW_VERSION`""

          # URL replacement: only matches concrete-version URLs (e.g. SenzingSDK_4.3.0.26135.msi),
          # so the autoupdate template URL (SenzingSDK_$version.msi) is left untouched
          $urlPattern = '"url":\s*"https://[^"]+SenzingSDK_[\d.]+\.msi"'
          $content = $content -replace $urlPattern, "`"url`": `"$($env:S3_URL)$env:LATEST_KEY`""

          # Hash replacement: only one hash field in the manifest, so no anchoring needed
          $content = $content -replace '"hash":\s*"[0-9a-f]+"', "`"hash`": `"$hash`""

          # Sanity check: the autoupdate template must still be intact
          if ($content -notmatch 'SenzingSDK_\$version\.msi') {
              Write-Error "Autoupdate template was corrupted by replacements; aborting."
              exit 1
          }

          Set-Content -Path $manifestPath -Value $content -Encoding UTF8 -NoNewline

          Write-Host "Manifest updated successfully"

          # Clean up
          Remove-Item $tempFile -Force

      - name: Create signed commit and pull request
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          $repo = $env:GITHUB_REPOSITORY
          $branch = "update-senzingsdk-$env:NEW_VERSION"
          $manifestPath = "bucket/senzingsdk.json"

          # Base the branch on main's current head so re-runs start clean (one commit on top of main)
          $mainSha = gh api "repos/$repo/git/ref/heads/main" --jq '.object.sha'
          # Native (gh) failures don't throw under ErrorActionPreference='Stop', so check explicitly
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($mainSha)) {
              Write-Error "Failed to resolve the head SHA of main."
              exit 1
          }

          # Create or reset the remote branch to main's head.
          # PATCH fails if the branch doesn't exist yet, so fall back to creating it.
          gh api -X PATCH "repos/$repo/git/refs/heads/$branch" -f sha=$mainSha -F force=true 2>$null
          if ($LASTEXITCODE -ne 0) {
              gh api -X POST "repos/$repo/git/refs" -f ref="refs/heads/$branch" -f sha=$mainSha | Out-Null
              if ($LASTEXITCODE -ne 0) {
                  Write-Error "Failed to create branch $branch."
                  exit 1
              }
          }

          # Commit the updated manifest via the GraphQL API so GitHub signs the commit
          # (shows as "Verified"); a local `git commit` would be unsigned.
          $contents = [Convert]::ToBase64String([IO.File]::ReadAllBytes((Resolve-Path $manifestPath).Path))
          $query = 'mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { oid url } } }'
          $body = @{
              query = $query
              variables = @{
                  input = @{
                      branch = @{
                          repositoryNameWithOwner = $repo
                          branchName = $branch
                      }
                      message = @{ headline = "Update senzingsdk to version $env:NEW_VERSION" }
                      # The branch head equals $mainSha after the create/reset above
                      expectedHeadOid = $mainSha
                      fileChanges = @{
                          additions = @(
                              @{ path = $manifestPath; contents = $contents }
                          )
                      }
                  }
              }
          } | ConvertTo-Json -Depth 10

          # Unique temp path avoids collisions if this ever runs on a shared (self-hosted) runner
          $bodyFile = [System.IO.Path]::GetTempFileName()
          Set-Content -Path $bodyFile -Value $body -Encoding UTF8
          # Capture the commit OID: gh exits non-zero on GraphQL errors, and a missing OID
          # catches any partial-success response that still returns exit 0.
          $commitOid = gh api graphql --input $bodyFile --jq '.data.createCommitOnBranch.commit.oid'
          $commitExit = $LASTEXITCODE
          Remove-Item $bodyFile -Force
          if ($commitExit -ne 0 -or [string]::IsNullOrWhiteSpace($commitOid)) {
              Write-Error "Failed to create signed commit on $branch via createCommitOnBranch."
              exit 1
          }
          Write-Host "Created signed commit $commitOid on $branch"

          # If a PR already exists for this branch, the commit above just updated it; skip creation
          $existingPr = gh pr list --head $branch --base main --state open --json url --jq '.[0].url'
          if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to query existing pull requests for $branch."
              exit 1
          }
          if ($existingPr) {
              Write-Host "PR already exists for $branch, updated by the new commit: $existingPr"
          } else {
              gh pr create `
                --base main `
                --head $branch `
                --title "Update senzingsdk to version $env:NEW_VERSION" `
                --body "Automated update from GitHub Actions workflow.

          ## Changes
          - Updated version from $env:CURRENT_VERSION to $env:NEW_VERSION
          - Updated SHA256 hash

          ## Source
          - S3 Bucket: $env:S3_URL
          - File: $env:LATEST_KEY"
              if ($LASTEXITCODE -ne 0) {
                  Write-Error "Failed to create pull request for $branch."
                  exit 1
              }
          }
